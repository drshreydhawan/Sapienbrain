<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Recall — one-tap second brain</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0E1420">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1420; --raised:#161E2C; --raised2:#1F2937; --line:#2A3547; --line2:#3A4A63;
    --text:#E8EDF5; --dim:#8B97A8; --faint:#5A6678;
    --rec:#FF4D45; --amber:#FFB020; --blue:#5B8DEF; --ok:#3DCB8F;
    --tab1:#4FBDBA; --tab2:#9B8AFB; --tab3:#F4A9A8; --tab4:#E8C468; --tab5:#8FBF8A; --tab6:#7C8CA6;
    --mono:'IBM Plex Mono',monospace; --disp:'Archivo',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--ink) radial-gradient(circle, rgba(232,237,245,.05) 1px, transparent 1px) 0 0/22px 22px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;overflow-x:hidden}
  .app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:0 18px 108px}
  @keyframes vin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue)!important}
  button:focus-visible{outline:2px solid rgba(91,141,239,.55);outline-offset:2px}

  header{display:flex;align-items:center;justify-content:space-between;padding:20px 2px 6px;gap:8px}
  .brand{font-family:'Archivo',sans-serif;font-weight:700;font-size:19px;letter-spacing:-.02em}
  .brand span{color:var(--rec)}
  .hbtns{display:flex;gap:8px;align-items:center}
  .lang{background:var(--raised);color:var(--dim);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font:500 12px 'IBM Plex Mono',monospace}
  .gear{cursor:pointer}

  .recbtn{display:block;width:min(320px,88%);margin:0 auto;padding:36px 0;border-radius:28px;border:none;cursor:pointer;
    background:linear-gradient(180deg,#FF5B53 0%,#F03B33 100%);color:#fff;font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:.18em;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.22), inset 0 -3px 0 rgba(0,0,0,.18), 0 12px 34px rgba(255,77,69,.30);
    transition:transform .09s, box-shadow .25s}
  .recbtn:active{transform:scale(.965)}
  .recbtn:disabled{opacity:.5;cursor:default}
  .recording .recbtn{background:linear-gradient(180deg,#C92C24 0%,#A81F18 100%);animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 10px 26px rgba(179,38,30,.30)}
    50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 10px 44px rgba(255,77,69,.55)}}

  .hero{display:flex;flex-direction:column;align-items:center;padding:30px 0 20px;width:100%}
  .timer{margin-top:18px;font:500 30px var(--mono);color:var(--faint);letter-spacing:.04em;font-variant-numeric:tabular-nums}
  .recording .timer{color:var(--text)}
  .eq{display:flex;gap:4px;align-items:center;height:24px;margin-top:8px}
  .eq i{width:4px;height:6px;border-radius:2px;background:var(--rec);animation:eqb 1.1s ease-in-out infinite}
  .eq i:nth-child(2){animation-delay:.12s}.eq i:nth-child(3){animation-delay:.28s}
  .eq i:nth-child(4){animation-delay:.42s}.eq i:nth-child(5){animation-delay:.6s}
  @keyframes eqb{0%,100%{height:6px;opacity:.55}50%{height:22px;opacity:1}}
  .live{width:100%;margin-top:12px;min-height:40px;max-height:120px;overflow-y:auto;color:var(--dim);font-size:13.5px;text-align:center;padding:0 6px;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0,#000 16px);mask-image:linear-gradient(to bottom,transparent 0,#000 16px)}
  .live em{color:var(--faint);font-style:normal}
  .hint{margin-top:8px;color:var(--faint);font-size:12.5px;text-align:center}
  .typelink{margin-top:12px;background:none;border:none;color:var(--blue);font:600 13px 'Inter',sans-serif;cursor:pointer;padding:6px 10px}
  .typedbox{width:100%;background:var(--raised);border:1px solid var(--line);border-radius:14px;color:var(--text);padding:12px;font:400 14px 'Inter',sans-serif;margin-bottom:10px;resize:vertical}

  .proc{display:flex;align-items:center;gap:10px;justify-content:center;color:var(--amber);font:500 13px 'IBM Plex Mono',monospace;padding:8px 0}
  .spin{width:14px;height:14px;border:2px solid var(--amber);border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .sect{font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin:24px 0 10px}
  .dayhead{font:600 10.5px var(--mono);color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin:16px 2px 8px}
  .search{width:100%;background:var(--raised) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%235A6678" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>') 13px center no-repeat;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:11px 13px 11px 37px;font-size:14px;margin-bottom:12px}
  .search::placeholder{color:var(--faint)}
  .cats{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
  .cats::-webkit-scrollbar{display:none}
  .chip{flex:none;background:var(--raised);border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:7px 13px;font:600 12.5px 'Inter',sans-serif;cursor:pointer}
  .chip.on{background:var(--raised2);color:var(--text);border-color:var(--faint)}
  .chip b{color:var(--amber);font-weight:700;margin-left:3px}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

  .card{background:var(--raised);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:10px;cursor:pointer;transition:background .15s,border-color .15s,transform .1s}
  .card:active{background:var(--raised2);transform:scale(.99)}
  @media (hover:hover){.card:hover{background:var(--raised2);border-color:var(--line2)}}
  .card h3{font-family:var(--disp);font-weight:600;font-size:15.5px;letter-spacing:-.01em;margin-bottom:3px}
  .meta{font:400 11.5px var(--mono);color:var(--faint);font-variant-numeric:tabular-nums}
  .card p{color:var(--dim);font-size:13.5px;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badge{display:inline-block;font:500 11px var(--mono);color:var(--amber);margin-top:8px}
  .empty{color:var(--faint);font-size:13.5px;text-align:center;padding:28px 12px;border:1px dashed var(--line);border-radius:16px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 2px}
  .stat{background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:12px 6px 9px;text-align:center}
  .stat b{display:block;font:700 19px var(--mono);letter-spacing:-.02em;font-variant-numeric:tabular-nums;white-space:nowrap}
  .stat span{font:600 9.5px var(--disp);letter-spacing:.13em;color:var(--faint);text-transform:uppercase}
  .stat.warn b{color:var(--rec)} .stat.good b{color:var(--ok)} .stat.amber b{color:var(--amber)}

  .back{background:none;border:none;color:var(--blue);font:600 14px 'Inter',sans-serif;cursor:pointer;padding:14px 0 4px;display:block}
  .dtitle{font-family:'Archivo',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.02em;line-height:1.25;margin-top:4px}
  .kindtag{display:inline-block;vertical-align:middle;font:700 9.5px 'IBM Plex Mono',monospace;letter-spacing:.08em;border-radius:6px;padding:2px 7px;margin-left:7px}
  .kindtag.tasks{background:rgba(255,176,32,.15);color:var(--amber)}
  .kindtag.note{background:rgba(91,141,239,.15);color:var(--blue)}
  .kindtag.log{background:rgba(139,151,168,.18);color:var(--dim)}
  .kindtag.mixed{background:rgba(61,203,143,.15);color:var(--ok)}
  .dbody p{color:var(--dim);margin:10px 0}

  .ai{display:flex;gap:10px;align-items:center;background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px}
  .ai .txt{flex:1;min-width:0}
  .ai.done .txt .t{color:var(--faint);text-decoration:line-through}
  .ai .src{display:block;font:400 11px 'IBM Plex Mono',monospace;color:var(--faint);margin-top:2px}
  .due{color:var(--blue);font:500 11px var(--mono);margin-left:6px;white-space:nowrap}
  .due.overdue{color:var(--rec);font-weight:700}
  .mini{text-align:center;color:var(--faint);font:500 12px 'IBM Plex Mono',monospace;margin-top:-4px}
  .age{color:var(--faint);font:500 11px 'IBM Plex Mono',monospace;margin-left:6px}
  .age.old{color:var(--rec)}
  .pill{flex:none;border-radius:999px;border:1px solid var(--amber);background:none;color:var(--amber);font:700 10px var(--mono);letter-spacing:.06em;padding:5px 9px;cursor:pointer;min-width:64px;text-align:center;transition:color .15s,border-color .15s,background .15s}
  .pill.waiting{border-color:var(--blue);color:var(--blue)}
  .pill.done{border-color:var(--ok);background:rgba(61,203,143,.12);color:var(--ok)}
  .ico{flex:none;background:none;border:none;cursor:pointer;font-size:15px;opacity:.8;padding:3px 4px;text-decoration:none}
  .kill{flex:none;background:none;border:none;color:var(--faint);cursor:pointer;font-size:15px;padding:3px 4px}

  details{margin-top:16px}
  summary{color:var(--blue);font-weight:600;font-size:14px;cursor:pointer;list-style:none}
  .transcript{white-space:pre-wrap;color:var(--dim);font-size:13.5px;margin-top:10px;background:var(--raised);border-radius:12px;padding:13px;border:1px solid var(--line)}
  .danger{margin-top:22px;background:none;border:1px solid var(--line);color:var(--faint);border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer}
  .retry{background:var(--amber);color:#221500;border:none;border-radius:10px;padding:11px 16px;font-weight:600;font-size:14px;cursor:pointer;margin-top:10px}
  .primary{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:600;font-size:14px;cursor:pointer}

  .brief{background:linear-gradient(160deg,#1B2438,#171F2E);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:16px;padding:16px;margin:10px 0 14px;white-space:pre-wrap;color:var(--text);font-size:14px}
  .askbox{display:flex;gap:8px;margin:12px 0}
  .askbox input{flex:1;background:var(--raised);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 13px;font-size:14px}
  .answer{background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:14px;white-space:pre-wrap;font-size:14px;color:var(--text);margin-bottom:10px}

  .frow{display:flex;gap:8px;align-items:center;background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .frow span{flex:1;font-weight:600}
  .frow button{background:none;border:none;color:var(--blue);font:600 13px 'Inter',sans-serif;cursor:pointer;padding:4px 6px}
  .frow button.del{color:var(--rec)}
  .err{background:#2A1518;border:1px solid #52252A;color:#FFB3AE;border-radius:12px;padding:12px 14px;font-size:13.5px;margin:12px 0}
  .note{color:var(--faint);font-size:12.5px;margin:8px 0}

  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,18,30,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line)}
  .nav-in{max-width:520px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;color:var(--faint);font:600 10.5px var(--disp);letter-spacing:.1em;padding:10px 0 max(12px, env(safe-area-inset-bottom));cursor:pointer;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;transition:color .15s}
  nav button svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  nav button.on{color:var(--text)}
  nav button.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:2px;border-radius:0 0 2px 2px;background:var(--rec)}
  nav button.alert::before{content:'';position:absolute;top:7px;left:calc(50% + 9px);width:6px;height:6px;border-radius:50%;background:var(--rec);box-shadow:0 0 0 2px var(--ink)}
  @media (prefers-reduced-motion: reduce){.spin,.eq i,.recording .recbtn{animation:none}.app{animation:none!important}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<nav><div class="nav-in">
  <button id="tab-rec" class="on" onclick="go('home')"><svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 11a7 7 0 0 1-14 0"/><line x1="12" y1="18" x2="12" y2="21"/></svg>Record</button>
  <button id="tab-dash" onclick="go('dashboard')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Dashboard</button>
  <button id="tab-ses" onclick="go('sessions')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3.5" y1="6" x2="3.51" y2="6"/><line x1="3.5" y1="12" x2="3.51" y2="12"/><line x1="3.5" y1="18" x2="3.51" y2="18"/></svg>Sessions</button>
  <button id="tab-ask" onclick="go('ask')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="10" x2="8.01" y2="10"/><line x1="12" y1="10" x2="12.01" y2="10"/><line x1="16" y1="10" x2="16.01" y2="10"/></svg>Ask</button>
</div></nav>

<script>
/* ================= state ================= */
let sessions = [];
let folders = [];
const DEFAULT_FOLDERS = ['Clinic','Bytesized','Spice Riot','Personal','Ideas'];
const FALLBACK = 'Personal';
let view = 'home';
let currentId = null;
let recState = 'idle';
let finalText = '', snapFinal = '', interimText = '';
let recognition = null;
let startedAt = 0, timerIv = null, elapsed = 0;
let searchQ = '', activeCat = 'All', activeKind = 'All', lastError = '', keepRecording = false;
let mediaRecorder = null, audioChunks = [], mediaStream = null;
let useWhisper = true;
let showTyped = false, typedDraft = '';
let askQ = '', askAnswer = '', askBusy = false;
let brief = '', briefBusy = false;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

/* ================= sync (Supabase) ================= */
// Anon key + project URL are public by design (RLS scoped to auth.uid() protects the data) —
// same posture as the Anthropic/OpenAI keys, which are per-device and never touch the repo.
const SUPABASE_URL = 'https://mnqvsjhdrvboyjutukvo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ucXZzamhkcnZib3lqdXR1a3ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNjU2NjYsImV4cCI6MjA5OTg0MTY2Nn0.74MLlHBt9khQ5GbicZXEZjvF6u8dItmN6uxAvY6i-VU';
let sb = null, sbUser = null;
let authEmail = '', authBusy = false, authMsg = '';
let syncBusy = false, syncMsg = '', showMigratePrompt = false;

async function getSb(){
  if(sb) return sb;
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } });
  return sb;
}

async function initAuth(){
  try{
    const client = await getSb();
    const { data:{ session } } = await client.auth.getSession();
    sbUser = session ? session.user : null;
    client.auth.onAuthStateChange((_event, session)=>{
      const was = sbUser; sbUser = session ? session.user : null;
      if(sbUser && !was) onSignedIn(); else render();
    });
    if(sbUser) onSignedIn(); else render();
  }catch(e){ console.error('auth init failed', e); }
}

async function sendMagicLink(){
  const el = document.getElementById('authemail');
  const email = el ? el.value.trim() : authEmail;
  if(!email){ authMsg = 'Enter your email first.'; render(); return; }
  authEmail = email; authBusy = true; authMsg = ''; render();
  try{
    const client = await getSb();
    const { error } = await client.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.origin + window.location.pathname } });
    authMsg = error ? ('Failed: ' + error.message) : 'Check your email for a sign-in link.';
  }catch(e){ authMsg = 'Failed: ' + e.message; }
  authBusy = false; render();
}
async function signOut(){
  try{ const client = await getSb(); await client.auth.signOut(); }catch(e){}
  sbUser = null; syncMsg = ''; render();
}

async function onSignedIn(){
  syncBusy = true; syncMsg = 'Checking your account…'; render();
  try{
    const client = await getSb();
    const { count } = await client.from('sessions').select('id', { count:'exact', head:true });
    if(!count && sessions.length){ showMigratePrompt = true; }
    else{ await pullFromCloud(); syncMsg = 'Synced.'; }
  }catch(e){ syncMsg = 'Sync failed: ' + e.message; }
  syncBusy = false; render();
}

async function pullFromCloud(){
  const client = await getSb();
  const [{ data:cFolders }, { data:cSessions }, { data:cActions }, { data:cExpenses }] = await Promise.all([
    client.from('folders').select('*').order('position'),
    client.from('sessions').select('*').order('date', { ascending:false }),
    client.from('actions').select('*').order('idx'),
    client.from('expenses').select('*').order('idx'),
  ]);
  if(cFolders && cFolders.length) folders = cFolders.map(f=>f.name);
  if(cSessions){
    const actionsBySession = {};
    (cActions||[]).forEach(a=>{ (actionsBySession[a.session_id] = actionsBySession[a.session_id]||[])[a.idx] = { text:a.text, due:a.due, status:a.status, archivedAt: a.archived_at ? new Date(a.archived_at).getTime() : null }; });
    const expensesBySession = {};
    (cExpenses||[]).forEach(e=>{ (expensesBySession[e.session_id] = expensesBySession[e.session_id]||[])[e.idx] = { desc:e.description, amount:Number(e.amount), currency:e.currency }; });
    sessions = cSessions.map(s=>({
      id:s.id, date:s.date, duration:s.duration, transcript:s.transcript,
      title:s.title, summary:s.summary, kind:s.kind, category:s.category, processed:s.processed,
      actions:(actionsBySession[s.id]||[]).filter(Boolean),
      expenses:(expensesBySession[s.id]||[]).filter(Boolean),
    }));
  }
  loadFix(); saveAll();
}

async function migrateToCloud(){
  showMigratePrompt = false; syncBusy = true; syncMsg = 'Uploading your local sessions…'; render();
  try{
    for(const s of sessions){ await pushSession(s); }
    await pushFolders();
    syncMsg = 'Uploaded ' + sessions.length + ' session(s).';
  }catch(e){ syncMsg = 'Upload failed: ' + e.message; }
  syncBusy = false; render();
}
function skipMigration(){ showMigratePrompt = false; syncMsg = 'Skipped — new recordings will still sync.'; render(); }

async function pushSession(s){
  if(!sbUser) return;
  const client = await getSb();
  await client.from('sessions').upsert({
    id:s.id, user_id:sbUser.id, date:s.date, duration:s.duration||0,
    transcript:s.transcript||'', title:s.title||'', summary:s.summary||'',
    kind:s.kind||'note', category:s.category||FALLBACK, processed:!!s.processed,
    updated_at:new Date().toISOString(),
  });
  await client.from('actions').delete().eq('session_id', s.id);
  const actionRows = (s.actions||[]).map((a,idx)=>({ session_id:s.id, user_id:sbUser.id, idx, text:a.text, due:a.due||null, status:a.status||'open', archived_at:a.archivedAt ? new Date(a.archivedAt).toISOString() : null }));
  if(actionRows.length) await client.from('actions').insert(actionRows);
  await client.from('expenses').delete().eq('session_id', s.id);
  const expenseRows = (s.expenses||[]).map((e,idx)=>({ session_id:s.id, user_id:sbUser.id, idx, description:e.desc, amount:e.amount, currency:e.currency||'INR' }));
  if(expenseRows.length) await client.from('expenses').insert(expenseRows);
}
async function pushDeleteSession(id){
  if(!sbUser) return;
  const client = await getSb();
  await client.from('sessions').delete().eq('id', id);
}
async function pushFolders(){
  if(!sbUser) return;
  const client = await getSb();
  await client.from('folders').delete().eq('user_id', sbUser.id);

const ARCHIVE_DAYS = 30;
function loadAll(){
  try{ const r = localStorage.getItem('brain-sessions'); sessions = r ? JSON.parse(r) : []; }catch(e){ sessions = []; }
  try{ const f = localStorage.getItem('recall-folders'); folders = f ? JSON.parse(f) : DEFAULT_FOLDERS.slice(); }catch(e){ folders = DEFAULT_FOLDERS.slice(); }
  if(!folders.includes(FALLBACK)) folders.push(FALLBACK);
  let purged = false;
  const cutoff = Date.now() - ARCHIVE_DAYS*86400000;
  sessions.forEach(s=>{
    if(!s.category) s.category = FALLBACK;
    if(!s.kind) s.kind = (s.actions||[]).length ? 'tasks' : 'note';

    s.actions = (s.actions||[]).filter(a=>{

      if(a.status==='killed'){
        if(!a.archivedAt) a.archivedAt = Date.now();
        if(a.archivedAt < cutoff){ purged = true; return false; }
      }
      return true;
    });
  });
  if(purged) saveAll();
}

/* ================= recording ================= */
// Screen Wake Lock — the phone auto-sleeping mid-recording kills SpeechRecognition
// and freezes the tab. Hold a wake lock for the duration of a recording; the OS
// auto-releases it whenever the tab is hidden, so re-acquire on return if still recording.
let wakeLock = null;
async function acquireWakeLock(){
  try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
}
function releaseWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){}
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible' && recState === 'recording') acquireWakeLock();
});

async function toggleRecord(){
  if(recState === 'recording'){ stopRecording(); return; }
  if(recState !== 'idle') return;
  lastError = '';
  useWhisper = !!getOAKey();
  if(!SR && !useWhisper){ lastError = 'Live transcription needs Chrome (Android or desktop), or add an OpenAI key in Settings for Whisper transcription. You can still use "Type it instead" below.'; render(); return; }

  finalText = ''; snapFinal = ''; interimText = ''; elapsed = 0; keepRecording = true;
  audioChunks = []; mediaRecorder = null;

  if(useWhisper){
    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mime = (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm')) ? 'audio/webm' : '';
      mediaRecorder = new MediaRecorder(mediaStream, mime?{mimeType:mime}:undefined);
      mediaRecorder.ondataavailable = e=>{ if(e.data && e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.start();
    }catch(e){
      useWhisper = false;
      if(!SR){ lastError = 'Microphone access denied, and no live-transcription fallback is available. Allow the mic and try again.'; render(); return; }
      lastError = 'Whisper mic access failed \u2014 falling back to live transcription for this recording.';
    }
  }

  recState = 'recording'; startedAt = Date.now();
  timerIv = setInterval(()=>{ elapsed = Math.floor((Date.now()-startedAt)/1000); const t=document.getElementById('timer'); if(t) t.textContent = fmtDur(elapsed); }, 1000);
  render();
  acquireWakeLock();

  if(!SR){ return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = document.getElementById('lang') ? document.getElementById('lang').value : 'en-IN';
  recognition.onstart = ()=>{ lastError=''; render(); };
  recognition.onresult = (ev)=>{
    // Android Chrome re-delivers results and misreports resultIndex.
    // Rebuild from the full result list every event instead of appending.
    snapFinal = ''; interimText = '';
    for(let i = 0; i < ev.results.length; i++){
      const t = ev.results[i][0].transcript;
      if(ev.results[i].isFinal) snapFinal += t.trim() + ' ';
      else interimText += t;
    }
    updateLive();
  };
  recognition.onend = ()=>{
    finalText += snapFinal; snapFinal = '';
    if(keepRecording){ try{ recognition.start(); }catch(e){} }
  };
  recognition.onerror = (ev)=>{
    if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
      keepRecording = false;
      lastError = 'Speech recognition blocked (error: ' + ev.error + '). Allow microphone for this site in Chrome, or use "Type it instead".';
      stopRecording();
    } else if(ev.error === 'audio-capture'){
      keepRecording = false; lastError = 'No microphone found (error: audio-capture).'; stopRecording();
    } else if(ev.error === 'network'){
      lastError = 'Speech service network error \u2014 recognition needs an internet connection.'; render();
    }
  };
  try{ recognition.start(); }catch(e){ lastError='Could not start recognition: '+e.message; keepRecording=false; recognition=null; recState='idle'; clearInterval(timerIv); render(); }
}

async function stopRecording(){
  keepRecording = false;
  releaseWakeLock();
  if(recognition){ try{ recognition.stop(); }catch(e){} recognition = null; }
  clearInterval(timerIv);
  const dur = elapsed;
  const liveTranscript = (finalText + snapFinal + ' ' + interimText).replace(/\s+/g,' ').trim();

  if(useWhisper && mediaRecorder){
    recState = 'processing'; lastError='Transcribing with Whisper\u2026'; render();
    await new Promise(resolve=>{ mediaRecorder.onstop = resolve; try{ mediaRecorder.stop(); }catch(e){ resolve(); } });
    if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
    const blob = new Blob(audioChunks, {type: (audioChunks[0] && audioChunks[0].type) || 'audio/webm'});
    let transcript = '';
    try{ transcript = await whisperTranscribe(blob); }
    catch(e){ lastError = 'Whisper transcription failed: ' + e.message + (liveTranscript?' \u2014 using live captions instead.':''); }
    if(!transcript) transcript = liveTranscript;
    if(!transcript){ recState='idle'; if(!lastError) lastError='Nothing was transcribed.'; render(); return; }
    lastError=''; processTranscript(transcript, dur);
    return;
  }

  if(recState !== 'recording' && !liveTranscript){ recState='idle'; render(); return; }
  if(!liveTranscript){ recState = 'idle'; if(!lastError) lastError = 'Nothing was transcribed \u2014 the mic didn\u2019t pick up speech.'; render(); return; }
  processTranscript(liveTranscript, dur);
}

async function whisperTranscribe(blob){
  const key = getOAKey();
  if(!key) throw new Error('no OpenAI key set');
  const fd = new FormData();
  fd.append('file', blob, 'audio.webm');
  fd.append('model', 'whisper-1');
  const lang = document.getElementById('lang');
  if(lang && lang.value && lang.value.slice(0,2) !== 'en') fd.append('language', lang.value.slice(0,2));
  const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method:'POST', headers:{ 'Authorization':'Bearer '+key }, body: fd
  });
  if(resp.status===401){ try{ localStorage.removeItem('openai-key'); }catch(e){} throw new Error('key rejected'); }
  if(!resp.ok){ throw new Error('HTTP '+resp.status); }
  const data = await resp.json();
  return (data.text||'').trim();
}

async function callClaude(userContent, maxTokens){
  let key = getKey();
  if(!key){ if(!setKey()) return null; key = getKey(); }
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens: maxTokens||1000, messages:[{role:'user', content:userContent}] })
  });
  if(resp.status === 401 || resp.status === 403){
    try{ localStorage.removeItem('anthropic-key'); }catch(e){}
    lastError = 'API key was rejected \u2014 you\u2019ll be asked for it again on the next request.';
    return null;
  }
  const data = await resp.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
}

function summarizePrompt(transcript){
  return `You are the processing engine of a personal "second brain" voice recorder. The transcript below was captured by live speech recognition, so expect missing punctuation and misheard words; infer intent charitably. It may contain English, Hindi, or a mix.

First decide what KIND of capture this is \u2014 don't force every recording into the same shape:
- "tasks" \u2014 mostly action items and to-dos ("call the lab", "need to get tyres checked")
- "note" \u2014 an observation, idea, reflection, or piece of information worth keeping, with no real action attached (an idea for a product, a thought about a patient case, something to remember)
- "log" \u2014 a record of something that happened or was decided, for reference later (what was discussed in a meeting, a decision made, an event)
- "mixed" \u2014 genuinely has both notable content AND real action items

Respond ONLY with valid JSON, no markdown fences, no preamble, in this exact shape:
{"title": "short 3-7 word title", "kind": "tasks | note | log | mixed", "summary": "2-5 sentence summary \u2014 for note/log kinds this is the main content, so make it genuinely useful to re-read later, not just a gist", "category": "one folder name", "action_items": [{"text": "specific task phrased as an instruction", "due": "YYYY-MM-DD or null"}, ...], "expenses": [{"desc": "what it was for", "amount": number, "currency": "INR"}, ...]}

For "category" pick exactly one of: ${folders.join(' | ')}.
Guide for the standard folders (ignore any that no longer exist): Clinic = dental clinic operations, patients, staff, labs, equipment. Bytesized = OSCE Coach, dental education, software products. Spice Riot = the food brand. Personal = family, errands, health, travel. Ideas = new product or business concepts. Custom folders should be matched by name.
For "due": today is ${new Date().toISOString().slice(0,10)}. Resolve relative time expressions to real dates: "tomorrow", "next Tuesday", "in 3 days", "by Friday", "end of month" all become an actual YYYY-MM-DD. If a task is spoken as recurring or has no time reference, leave due null \u2014 do not guess a date that wasn't implied.
action_items should be EMPTY for "note" and "log" kind sessions unless something genuinely actionable slipped in \u2014 do not invent tasks just to fill the field. Never pad a pure thought or reflection with a manufactured to-do.
"expenses": only include a line if an actual amount of money spent, owed, or quoted is mentioned (a price, a bill, "spent X on Y", "the quote was X"). Assume INR unless another currency is stated. Do not invent amounts or log routine mentions of money with no figure attached. Empty array if none.

TRANSCRIPT:
${transcript}`;
}

async function summarize(transcript){
  try{
    const text = await callClaude(summarizePrompt(transcript), 1000);
    if(!text) return null;
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){ console.error('summarize failed', e); return null; }
}

async function processTranscript(transcript, dur){
  recState = 'processing'; render();
  const session = { id:'s_'+Date.now(), date:new Date().toISOString(), duration:dur, transcript,
    title:'Untitled session', summary:'', category:FALLBACK, actions:[], expenses:[], processed:false };
  const r = await summarize(transcript);
  if(r) applyResult(session, r);
  sessions.unshift(session);
  saveAll();
  trySync(()=>pushSession(session));
  recState = 'idle'; currentId = session.id; view = 'detail'; render();
}

function applyResult(s, r){
  s.title = r.title || s.title;
  s.summary = r.summary || '';
  s.kind = ['tasks','note','log','mixed'].includes(r.kind) ? r.kind : (((r.action_items||[]).length) ? 'tasks' : 'note');
  s.category = folders.includes(r.category) ? r.category : FALLBACK;
  s.actions = (r.action_items||[]).map(t=>({ text: typeof t==='string' ? t : (t.text||''), due:(t&&t.due)||null, status:'open' })).filter(a=>a.text);
  s.expenses = (r.expenses||[]).map(e=>({ desc: (e&&e.desc)||'', amount: (e&&typeof e.amount==='number')?e.amount:null, currency: (e&&e.currency)||'INR' })).filter(e=>e.desc && e.amount);
  s.processed = true;
}

async function retryProcess(id){
  const s = sessions.find(x=>x.id===id); if(!s) return;
  recState = 'processing'; render();
  const r = await summarize(s.transcript);
  if(r){ applyResult(s, r); saveAll(); trySync(()=>pushSession(s)); }
  else if(!lastError){ lastError = 'Processing failed \u2014 check your connection and retry.'; }
  recState = 'idle'; render();
}

function importData(ev){
  const file = ev.target.files && ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const d = JSON.parse(reader.result);
      if(!Array.isArray(d.sessions)) throw new Error('bad file');
      const have = new Set(sessions.map(s=>s.id));
      let added = 0;
      d.sessions.forEach(s=>{ if(!have.has(s.id)){ sessions.push(s); added++; } });
      sessions.sort((a,b)=> new Date(b.date)-new Date(a.date));
      (d.folders||[]).forEach(f=>{ if(!folders.some(x=>x.toLowerCase()===f.toLowerCase())) folders.push(f); });
      loadFix(); saveAll(); trySync(pushAllSessions);
      lastError=''; alert('Imported '+added+' new session(s).'); render();
    }catch(e){ lastError='That file doesn\u2019t look like a Recall backup.'; render(); }
  };
  reader.readAsText(file);
}

/* ================= render helpers ================= */
function fmtDur(s){ const m=Math.floor(s/60), ss=s%60; return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0'); }
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString(undefined,{day:'numeric',month:'short'})+' \u00b7 '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); }
function dayLabel(iso){
  const d = new Date(iso), now = new Date();
  const diff = Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) - new Date(d.getFullYear(),d.getMonth(),d.getDate()))/86400000);
  if(diff === 0) return 'Today';
  if(diff === 1) return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}) + (d.getFullYear()!==now.getFullYear() ? ' '+d.getFullYear() : '');
}
function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
function updateLive(){ const el=document.getElementById('live'); if(el) el.innerHTML = esc((finalText + snapFinal).slice(-260)) + '<em>' + esc(interimText) + '</em>'; }
function go(v){ view=v; currentId=null; render(); }
function openCount(catName){
  const list = catName==='All' ? sessions : sessions.filter(x=>(x.category||FALLBACK)===catName);
  return list.reduce((k,x)=>k+(x.actions||[]).filter(a=>a.status==='open'||a.status==='waiting').length,0);
}
function isOverdue(a){ return a.due && a.status!=='done' && a.status!=='killed' && a.due < new Date().toISOString().slice(0,10); }
function actionRow(s, i, withSrc){
  const a = s.actions[i];
  if(a.status==='killed') return '';
  const age = ageDays(s);
  const overdue = isOverdue(a);
  const ageTag = (a.status!=='done' && !overdue && age>=2) ? ' <span class="age'+(age>7?' old':'')+'">'+age+'d</span>' : '';
  const dueTag = a.due ? ' <b class="due'+(overdue?' overdue':'')+'">'+(overdue?'OVERDUE \u00b7 ':'')+esc(a.due)+'</b>' : '';
  const label = a.status==='open' ? 'OPEN' : a.status==='waiting' ? 'WAITING' : 'DONE';
  return '<div class="ai '+(a.status==='done'?'done':'')+'">'+
    '<button class="pill '+a.status+'" onclick="cycleStatus(\''+s.id+'\','+i+')">'+label+'</button>'+
    '<div class="txt"><span class="t">'+esc(a.text)+'</span>'+dueTag+ageTag+
    (withSrc?'<span class="src">'+esc(s.title)+' \u00b7 '+fmtDate(s.date)+'</span>':'')+'</div>'+
    '<button class="ico" title="Assign on WhatsApp" onclick="assignWA(\''+s.id+'\','+i+')">\uD83D\uDCAC</button>'+
    '<a class="ico" title="Add to Google Calendar" href="'+gcalUrl(a,s)+'" target="_blank" rel="noopener">\uD83D\uDCC5</a>'+
    '<button class="kill" title="Dismiss task" onclick="killAction(\''+s.id+'\','+i+')">\u2715</button>'+
  '</div>';
}
function allOpenTasks(){
  const out = [];
  sessions.forEach(s=> (s.actions||[]).forEach((a,i)=>{ if(a.status==='open'||a.status==='waiting') out.push({s,a,i}); }));
  out.sort((x,y)=>{
    const xo = isOverdue(x.a), yo = isOverdue(y.a);
    if(xo!==yo) return xo?-1:1;
    if(x.a.due && y.a.due) return x.a.due < y.a.due ? -1 : x.a.due > y.a.due ? 1 : 0;
    if(x.a.due) return -1;
    if(y.a.due) return 1;
    return new Date(y.s.date) - new Date(x.s.date);
  });
  return out;
}
function monthExpenses(){
  const now = new Date(); const ym = now.toISOString().slice(0,7);
  const rows = [];
  sessions.forEach(s=> (s.expenses||[]).forEach(e=>{ if(s.date.slice(0,7)===ym) rows.push({s,e}); }));
  return rows;
}

/* ================= views ================= */
let lastView = '';
function render(){
  const overdueN = sessions.reduce((k,s)=>k+(s.actions||[]).filter(isOverdue).length,0);
  document.getElementById('tab-rec').className = (view==='home'||view==='detail'||view==='settings') ? 'on':'';
  document.getElementById('tab-dash').className = (view==='dashboard' ? 'on':'') + (overdueN ? ' alert':'');
  document.getElementById('tab-ses').className = view==='sessions' ? 'on':'';
  document.getElementById('tab-ask').className = view==='ask' ? 'on':'';
  const app = document.getElementById('app');
  if(view !== lastView){
    app.style.animation = 'none'; void app.offsetHeight; app.style.animation = 'vin .18s ease';
    lastView = view;
  }
  if(view==='detail'){ app.innerHTML = renderDetail(); return; }
  if(view==='dashboard'){ app.innerHTML = renderDashboard(); return; }
  if(view==='sessions'){ app.innerHTML = renderSessions(); return; }
  if(view==='ask'){ app.innerHTML = renderAsk(); return; }
  if(view==='settings'){ app.innerHTML = renderSettings(); return; }
  app.innerHTML = renderHome();
  updateLive();
}

function headerHtml(title){
  return '<header><div class="brand">'+(title||'Re<span>call</span>')+' <small style="font:500 10px \'IBM Plex Mono\',monospace;color:var(--faint)">v16.1</small></div>'+
    '<div class="hbtns">'+
    (view==='home' ? '<select class="lang" id="lang" '+(recState!=='idle'?'disabled':'')+'>'+
      '<option value="en-IN">EN-IN</option><option value="en-US">EN-US</option><option value="hi-IN">HI-IN</option><option value="en-AU">EN-AU</option></select>' : '')+
    '<button class="lang gear" onclick="go(\'settings\')" title="Settings">\u2699\ufe0e</button>'+
    '</div></header>';
}

function renderHome(){
  let h = headerHtml();
  const openN = allOpenTasks().length;
  if(recState==='idle' && !showTyped){
    h += '<div class="mini">'+openN+' open task'+(openN===1?'':'s')+(sessions.length?' \u00b7 '+sessions.length+' session'+(sessions.length===1?'':'s'):'')+'</div>';
  }
  h += '<div class="hero '+(recState==='recording'?'recording':'')+'">'+
    '<button class="recbtn" onclick="toggleRecord()" '+(recState==='processing'?'disabled':'')+'>'+(recState==='recording'?'STOP':'RECORD')+'</button>'+
    '<div class="timer" id="timer">'+fmtDur(elapsed)+'</div>'+
    (recState==='recording'?'<div class="eq"><i></i><i></i><i></i><i></i><i></i></div>':'')+
    '<div class="live" id="live"></div>'+
    (recState==='idle' ? '<div class="hint">'+('wakeLock' in navigator ? 'One tap. The screen stays awake while recording.' : 'One tap. Keep the screen on while recording.')+'</div><div class="hint" style="opacity:.75">'+bootStatus()+'</div><button class="typelink" onclick="showTyped=!showTyped;render()">Type it instead</button>' : '')+
  '</div>';

  if(recState==='processing') h += '<div class="proc"><div class="spin"></div>PROCESSING WITH CLAUDE\u2026</div>';
  if(lastError) h += '<div class="err">'+esc(lastError)+'</div>';
  if(storageWarn) h += '<div class="err" style="background:#2A2312;border-color:#524A25;color:#FFD98A">'+esc(storageWarn)+'</div>';
  if(showTyped && recState==='idle'){
    h += '<textarea id="typed" class="typedbox" rows="4" oninput="typedDraft=this.value" placeholder="Paste or type notes, then process \u2014 same pipeline as voice.">'+esc(typedDraft)+'</textarea>'+
      '<button class="retry" style="width:100%" onclick="submitTyped()">Process with Claude</button>';
  }
  return h;
}

function renderSessions(){
  let h = '<header><div class="brand">Sessions</div><div class="hbtns"><button class="lang gear" onclick="go(\'settings\')">\u2699\ufe0e</button></div></header>';
  h += '<div class="cats">'+['All'].concat(folders).map(c=>{
    const n = openCount(c);
    const dot = c==='All' ? '' : '<i class="dot" style="background:'+folderColor(c)+'"></i>';
    return '<button class="chip '+(activeCat===c?'on':'')+'" onclick="activeCat=\''+c.replace(/'/g,"\\'")+'\';render()">'+dot+esc(c)+(n?' <b>'+n+'</b>':'')+'</button>';
  }).join('')+'</div>';
  h += '<div class="cats" style="margin-top:-4px">'+['All','tasks','note','log','mixed'].map(k=>{
    const label = k==='All'?'All types':kindLabel(k);
    return '<button class="chip '+(activeKind===k?'on':'')+'" onclick="activeKind=\''+k+'\';render()">'+label+'</button>';
  }).join('')+'</div>';
  h += '<input class="search" placeholder="Search titles, summaries, transcripts" value="'+esc(searchQ)+'" oninput="searchQ=this.value;renderList()">';
  h += '<div id="list">'+renderListInner()+'</div>';
  return h;
}

function renderListInner(){
  const q = searchQ.toLowerCase();
  const hits = sessions.filter(s => (activeCat==='All' || (s.category||FALLBACK)===activeCat) && (activeKind==='All' || (s.kind||'note')===activeKind) && (!q || (s.title+' '+s.summary+' '+s.transcript).toLowerCase().includes(q)))
    .sort((a,b)=> new Date(b.date) - new Date(a.date));
  if(!hits.length) return '<div class="empty">'+(sessions.length ? 'No matches.' : 'Nothing captured yet. Tap record and start talking.')+'</div>';
  let out = '', lastDay = '';
  hits.forEach(s=>{
    const day = dayLabel(s.date);
    if(day !== lastDay){ out += '<div class="dayhead">'+day+'</div>'; lastDay = day; }
    const open = (s.actions||[]).filter(a=>a.status==='open'||a.status==='waiting').length;
    out += '<div class="card" style="border-left:3px solid '+folderColor(s.category||FALLBACK)+'" onclick="currentId=\''+s.id+'\';view=\'detail\';render()">'+
      '<h3>'+esc(s.title)+'<span class="kindtag '+esc(s.kind||'note')+'">'+kindLabel(s.kind)+'</span></h3>'+
      '<div class="meta">'+fmtDate(s.date)+' \u00b7 '+fmtDur(s.duration)+' \u00b7 '+esc(s.category||FALLBACK)+'</div>'+
      (s.summary?'<p>'+esc(s.summary)+'</p>':'')+
      (open?'<span class="badge">'+open+' open task'+(open>1?'s':'')+'</span>':'')+
    '</div>';
  });
  return out;
}
function renderList(){ const el=document.getElementById('list'); if(el) el.innerHTML = renderListInner(); }

function renderDetail(){
  const s = sessions.find(x=>x.id===currentId);
  if(!s){ view='home'; return renderHome(); }
  let h = '<button class="back" onclick="go(\'sessions\')">\u2039 Back</button>'+
    '<div class="dtitle">'+esc(s.title)+' <span class="kindtag '+esc(s.kind||'note')+'">'+kindLabel(s.kind)+'</span></div>'+
    '<div class="meta">'+fmtDate(s.date)+' \u00b7 '+fmtDur(s.duration)+'</div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-top:8px"><i class="dot" style="background:'+folderColor(s.category)+'"></i><select class="lang" onchange="moveFolder(\''+s.id+'\',this.value)">'+
      folders.map(f=>'<option value="'+esc(f)+'" '+(f===s.category?'selected':'')+'>'+esc(f)+'</option>').join('')+
    '</select></div><div class="dbody">';
  if(recState==='processing') h += '<div class="proc"><div class="spin"></div>PROCESSING WITH CLAUDE\u2026</div>';
  if(lastError) h += '<div class="err">'+esc(lastError)+'</div>';
  if(s.summary) h += '<p>'+esc(s.summary)+'</p>';
  if(!s.processed) h += '<div class="err">Claude processing didn\u2019t complete for this session.</div><button class="retry" onclick="retryProcess(\''+s.id+'\')">Retry processing</button>';
  const live = (s.actions||[]).filter(a=>a.status!=='killed').length;
  if(live){
    h += '<div class="sect">Tasks \u00b7 tap status to cycle</div>';
    h += s.actions.map((a,i)=>actionRow(s,i,false)).join('');
  } else if(s.kind==='note' || s.kind==='log'){
    h += '<div class="note">No action items \u2014 filed as a '+kindLabel(s.kind).toLowerCase()+' for reference.</div>';
  }
  if((s.expenses||[]).length){
    h += '<div class="sect">Expenses</div>';
    h += s.expenses.map(e=>'<div class="frow"><span>'+esc(e.desc)+'</span><b style="color:var(--ok);font:700 13px \'IBM Plex Mono\',monospace">'+esc(e.currency)+' '+e.amount.toLocaleString()+'</b></div>').join('');
  }
  h += '<details><summary>Full transcript</summary><div class="transcript">'+esc(s.transcript)+'</div></details>';
  h += '<button class="danger" onclick="deleteSession(\''+s.id+'\')">Delete session</button></div>';
  return h;
}

function renderDashboard(){
  let h = '<header><div class="brand">Dashboard</div><div class="hbtns"><button class="lang gear" onclick="go(\'settings\')">\u2699\ufe0e</button></div></header>';
  const rows = allOpenTasks();
  const overdueN = rows.filter(r=>isOverdue(r.a)).length;
  const exp = monthExpenses();
  const inr = exp.reduce((n,{e})=>n + (e.currency==='INR' ? e.amount : 0), 0);
  h += '<div class="stats">'+
    '<div class="stat amber"><b>'+rows.length+'</b><span>Open</span></div>'+
    '<div class="stat'+(overdueN?' warn':'')+'"><b>'+overdueN+'</b><span>Overdue</span></div>'+
    '<div class="stat good"><b>\u20b9'+inr.toLocaleString('en-IN')+'</b><span>This month</span></div>'+
  '</div>';

  h += '<button class="primary" style="width:100%;margin-top:12px" onclick="runBrief()" '+(briefBusy?'disabled':'')+'>'+(briefBusy?'Writing your brief\u2026':'\u2600 Morning Brief')+'</button>';
  if(briefBusy) h += '<div class="proc"><div class="spin"></div>THINKING\u2026</div>';
  if(brief) h += '<div class="brief">'+esc(brief)+'</div>';

  h += '<div class="sect">Tasks \u00b7 by due date</div>';
  if(!rows.length) h += '<div class="empty">All clear. Open tasks from your sessions will collect here.</div>';
  else h += rows.map(({s,a,i})=>actionRow(s,i,true)).join('');

  const byCur = {};
  exp.forEach(({e})=>{ byCur[e.currency] = (byCur[e.currency]||0) + e.amount; });
  h += '<div class="sect">This month\u2019s expenses</div>';
  if(!exp.length) h += '<div class="empty">Nothing logged. Mention an amount while recording \u2014 "spent 4000 on lab fees" \u2014 and it lands here.</div>';
  else{
    h += '<div class="brief" style="background:linear-gradient(160deg,#1E2A22,#171F1B);border-color:#2A4536">'+
      Object.keys(byCur).map(c=>c+' '+byCur[c].toLocaleString()).join('  \u00b7  ')+' total</div>';
    h += exp.slice(0,12).map(({s,e})=>
      '<div class="frow"><span>'+esc(e.desc)+'<span class="src" style="display:block">'+esc(s.title)+' \u00b7 '+fmtDate(s.date)+'</span></span>'+
      '<b style="color:var(--ok);font:700 13px \'IBM Plex Mono\',monospace">'+esc(e.currency)+' '+e.amount.toLocaleString()+'</b></div>'
    ).join('');
  }

  h += '<div class="sect">Folders</div>';
  h += '<div class="cats">'+folders.map(c=>{
    const n = openCount(c);
    return '<button class="chip" onclick="activeCat=\''+c.replace(/'/g,"\\'")+'\';view=\'sessions\';render()"><i class="dot" style="background:'+folderColor(c)+'"></i>'+esc(c)+(n?' <b>'+n+'</b>':'')+'</button>';
  }).join('')+'</div>';
  return h;
}

function renderAsk(){
  let h = '<header><div class="brand">Ask your brain</div><div class="hbtns"><button class="lang gear" onclick="go(\'settings\')">\u2699\ufe0e</button></div></header>';
  h += '<div class="note">Questions are answered only from your own recordings \u2014 "what did I say about the Gurugram lab?", "what\u2019s pending for Spice Riot?"</div>';
  h += '<div class="askbox"><input id="askq" placeholder="Ask anything you\u2019ve recorded\u2026" value="'+esc(askQ)+'" onkeydown="if(event.key===\'Enter\')runAsk()">'+
    '<button class="primary" onclick="runAsk()" '+(askBusy?'disabled':'')+'>'+(askBusy?'\u2026':'Ask')+'</button></div>';
  if(!askAnswer && !askBusy && sessions.length){
    h += '<div class="cats">'+
      '<button class="chip" onclick="askSuggest(this.textContent)">What is still pending?</button>'+
      '<button class="chip" onclick="askSuggest(this.textContent)">What did I record this week?</button>'+
      '<button class="chip" onclick="askSuggest(this.textContent)">Any expenses I mentioned?</button>'+
    '</div>';
  }
  if(askBusy) h += '<div class="proc"><div class="spin"></div>SEARCHING YOUR SESSIONS\u2026</div>';
  if(askAnswer) h += '<div class="answer">'+esc(askAnswer)+'</div>';
  if(lastError) h += '<div class="err">'+esc(lastError)+'</div>';
  return h;
}

function renderAccount(){
  let h = '<div class="sect">Account — sync across devices</div>';
  if(showMigratePrompt){
    h += '<div class="err" style="background:#132A1E;border-color:#254536;color:#9AE6B4">You have '+sessions.length+' session'+(sessions.length===1?'':'s')+' on this device that aren’t in your account yet.'+
      '<div style="margin-top:8px;display:flex;gap:8px"><button class="primary" onclick="migrateToCloud()">Upload to account</button><button class="retry" style="background:var(--raised2);color:var(--text)" onclick="skipMigration()">Not now</button></div></div>';
  } else if(sbUser){
    h += '<div class="note">Signed in as '+esc(sbUser.email)+'. '+(syncBusy?'Syncing…':esc(syncMsg||'Sessions sync automatically.'))+'</div>';
    h += '<button class="retry" style="background:var(--raised2);color:var(--text)" onclick="signOut()">Sign out</button>';
  } else {
    h += '<div class="note">Sign in to sync sessions, tasks, and expenses across your phone and laptop. Recording still works without this — everything stays on this device until you sign in.</div>';
    h += '<div class="askbox"><input id="authemail" type="email" placeholder="you@email.com" value="'+esc(authEmail)+'" oninput="authEmail=this.value" onkeydown="if(event.key===\'Enter\')sendMagicLink()">'+
      '<button class="primary" onclick="sendMagicLink()" '+(authBusy?'disabled':'')+'>'+(authBusy?'…':'Send link')+'</button></div>';
    if(authMsg) h += '<div class="note">'+esc(authMsg)+'</div>';
  }
  return h;
}

function renderSettings(){
  let h = '<button class="back" onclick="go(\'home\')">\u2039 Back</button>';
  h += '<div class="dtitle">Settings</div>';
  if(lastError) h += '<div class="err">'+esc(lastError)+'</div>';
  h += renderAccount();
  h += '<div class="sect">Folders</div>';
  h += folders.map(f=>'<div class="frow"><span>'+esc(f)+'</span>'+
      '<button onclick="renameFolder(\''+f.replace(/'/g,"\\'")+'\')">Rename</button>'+
      (f===FALLBACK?'':'<button class="del" onclick="deleteFolder(\''+f.replace(/'/g,"\\'")+'\')">Delete</button>')+
    '</div>').join('');
  h += '<div class="askbox"><input id="newfolder" placeholder="New folder name"><button class="primary" onclick="addFolder()">Add</button></div>';
  h += '<div class="note">New recordings are auto-sorted into these folders by Claude. Renaming migrates existing sessions; deleting moves them to '+FALLBACK+'.</div>';
  h += '<div class="sect">Backup</div>';
  h += '<button class="retry" onclick="exportData()">Export backup (.json)</button> ';
  h += '<label class="retry" style="display:inline-block;background:var(--raised2);color:var(--text)">Import backup<input type="file" accept="application/json" style="display:none" onchange="importData(event)"></label>';
  h += '<div class="note">Everything lives in this browser\u2019s storage. Export regularly \u2014 clearing browser data or losing this device loses your notes.</div>';
  const archived = [];
  sessions.forEach(s=> (s.actions||[]).forEach((a,i)=>{ if(a.status==='killed') archived.push({s,a,i}); }));
  h += '<div class="sect">Archived tasks '+(archived.length?'\u00b7 '+archived.length:'')+'</div>';
  if(!archived.length) h += '<div class="note">Dismissed tasks sit here for '+ARCHIVE_DAYS+' days before being purged for good.</div>';
  else h += archived.map(({s,a,i})=>
    '<div class="frow"><span>'+esc(a.text)+'<span class="src" style="display:block">'+esc(s.title)+' \u00b7 '+daysLeft(a)+'d left</span></span>'+
    '<button onclick="restoreAction(\''+s.id+'\','+i+')">Restore</button></div>'
  ).join('');
  h += '<div class="sect">Anthropic API key <span style="color:var(--faint);font-weight:400">\u2014 summaries & classification</span></div>';
  h += '<button class="retry" style="background:var(--raised2);color:var(--text)" onclick="setKey()">'+(getKey()?'Replace key \u2713':'Set API key')+'</button>';
  h += '<div class="sect">OpenAI API key <span style="color:var(--faint);font-weight:400">\u2014 Whisper transcription (optional, better accuracy)</span></div>';
  h += '<button class="retry" style="background:var(--raised2);color:var(--text)" onclick="setOAKey()">'+(getOAKey()?'Replace key \u2713':'Set OpenAI key')+'</button>';
  h += '<div class="note">Without this, recording falls back to your browser\u2019s built-in speech recognition \u2014 faster but noticeably less accurate, especially with medical terms and Hindi-English mixing. With it set, every recording is transcribed by Whisper after you stop (2\u20134 second wait, no live captions during recording).</div>';
  return h;
}

/* ================= init ================= */
loadAll();
render();
initAuth();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
</script>
